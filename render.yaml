services:
  - type: web
    name: qr-poll-voting
    runtime: node
    buildCommand: npm install && npm run build && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/data/polls.db
    disk:
      name: poll-data
      mountPath: /opt/render/project/data
      sizeGB: 1
